<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E.Loom - From connection to fruition.</title>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { eloom: { surface: '#FAFAFA', olive: '#3A473D', camellia: '#B02A30', dark: '#151B17', point: '#C73A3A' } },
          fontFamily: { 
            serif: ['"Playfair Display"', '"Nanum Myeongjo"', 'serif'],
            sans: ['"Syncopate"', '"Pretendard"', '"Inter"', 'sans-serif'],
          },
          letterSpacing: { 
            futuristic: '0.25em',
            tightest: '-0.05em',
            tighter: '-0.03em',
            tight: '-0.01em'
          },
          borderWidth: { hairline: '0.5px' },
          animation: { 
             'fade-in': 'fadeIn 1s ease-in-out',
             'slide-down': 'slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
             'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards'
          },
          keyframes: { 
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            slideDown: { '0%': { transform: 'translateY(-10px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
            slideUp: { '0%': { transform: 'translate(-50%, 40px)', opacity: '0' }, '100%': { transform: 'translate(-50%, 0)', opacity: '1' } }
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Nanum+Myeongjo:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,600;1,300&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  
  <style>
    body { background-color: #FAFAFA; color: #151B17; overflow-x: hidden; font-family: 'Pretendard', 'Inter', sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #151B17; }
    ::-webkit-scrollbar-thumb { background: #3A473D; }
    .traditional-text { text-rendering: optimizeLegibility; letter-spacing: -0.04em; font-feature-settings: "palt" 1; }
    h1, h2, h3, .serif-text { letter-spacing: -0.02em; }
    .tracking-widest { letter-spacing: 0.15em !important; }
    .tracking-wider { letter-spacing: 0.08em !important; }
    .tracking-wide { letter-spacing: 0.03em !important; }
    @keyframes scrolldown {
        0% { transform: translateY(-100%); opacity: 0; }
        50% { opacity: 1; }
        100% { transform: translateY(200%); opacity: 0; }
    }
    input:-webkit-autofill, input:-webkit-autofill:hover, input:-webkit-autofill:focus, input:-webkit-autofill:active{
        transition: background-color 5000s ease-in-out 0s;
        -webkit-text-fill-color: #151B17 !important;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const SearchIcon = ({ className, onClick }) => (<svg onClick={onClick} className={className} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>);
    const UserIcon = ({ className, onClick }) => (<svg onClick={onClick} className={className} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>);
    const CartIcon = ({ className }) => (<svg className={className} width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1"><line x1="3" y1="6" x2="21" y2="6"></line><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><path d="M16 10a4 4 0 0 1-8 0"></path></svg>);
    const MenuIcon = ({ className }) => (<svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>);
    const Toast = ({ message, onClose, onViewCart }) => {
      if (!message) return null;
      return (
        <div className="fixed bottom-12 left-1/2 z-[100] animate-slide-up w-max max-w-[90vw]">
          <div className="bg-[#151B17]/95 text-white flex flex-row items-center justify-between shadow-2xl border border-white/10 backdrop-blur-md rounded-full overflow-hidden">
            <span className="font-serif text-[11px] font-medium tracking-wider pl-6 pr-6 py-4 traditional-text">{message}</span>
            <div className="flex border-l border-white/10">
              <button onClick={() => { onClose(); onViewCart(); }} className="font-sans text-[10px] tracking-[0.2em] px-6 py-4 text-white/60 hover:text-white hover:bg-white/5 transition-colors uppercase whitespace-nowrap">VIEW CART</button>
              <button onClick={onClose} className="px-4 py-4 text-white/30 hover:text-white hover:bg-white/5 transition-colors border-l border-white/10">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
              </button>
            </div>
          </div>
        </div>
      );
    };
    const SidebarMenu = ({ isOpen, onClose, setCurrentPage }) => {
      const mainItems = ['Lookbook', 'Notice', 'FAQ', 'Contact'];
      const subItems = ['Account', 'Wishlist', 'Social Media', 'Language'];
      
      return (
        <div className={`fixed inset-0 z-[100] transition-opacity duration-700 ${isOpen ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
          <div className="absolute inset-0 bg-black/30 backdrop-blur-md" onClick={onClose} />
          <div className={`absolute top-0 right-0 w-full md:w-[450px] h-full bg-[#FAFAFA] shadow-[-10px_0_30px_rgba(0,0,0,0.1)] flex flex-col transition-transform duration-700 ease-[cubic-bezier(0.16,1,0.3,1)] ${isOpen ? 'translate-x-0' : 'translate-x-[110%]'}`}>
            {/* Header */}
            <div className="h-[100px] flex items-center justify-end px-12 border-b border-[#3A473D]/5">
              <button onClick={onClose} className="p-2 hover:opacity-50 transition-opacity">
                 <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#151B17" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
              </button>
            </div>
            
            {/* Menu List */}
            <div className="flex-1 overflow-y-auto px-12 py-16 flex flex-col space-y-12">
              <ul className="flex flex-col space-y-8">
                {mainItems.map(item => (
                  <li key={item}>
                    <button 
                      className="font-sans text-xl md:text-2xl text-[#151B17] uppercase tracking-[0.2em] traditional-text hover:text-[#B02A30] transition-colors group relative text-left"
                      onClick={() => { setCurrentPage(item.toLowerCase().replace(' ', '')); onClose(); }}
                    >
                      <span>{item}</span>
                    </button>
                  </li>
                ))}
              </ul>
              
              <div className="w-full h-[1px] bg-[#3A473D]/10" />
              
              <ul className="flex flex-col space-y-6">
                {subItems.map(item => (
                  <li key={item}>
                    <button 
                      className="font-sans text-sm tracking-[0.2em] text-[#3A473D]/70 uppercase hover:text-[#151B17] transition-colors text-left"
                      onClick={() => { setCurrentPage(item.toLowerCase().replace(' ', '')); onClose(); }}
                    >
                      {item}
                    </button>
                  </li>
                ))}
              </ul>
            </div>
          </div>
        </div>
      );
    };
    const GNB = ({ currentPage, setCurrentPage, isSearchOpen, setIsSearchOpen, isMenuOpen, setIsMenuOpen, searchQuery, setSearchQuery, handleSearchSubmit }) => {
      const isDarkTheme = currentPage === 'home' || currentPage === 'brand';
      
      return (
        <nav className={`fixed top-0 w-full z-50 transition-all duration-500`}>
          {/* Main GNB Bar */}
          <div className={`relative w-full h-[100px] flex justify-between items-center px-12 lg:px-24 border-b z-20 transition-colors duration-500 ${isDarkTheme ? 'bg-gradient-to-b from-black/80 via-black/30 to-transparent backdrop-blur-[2px] border-white/10' : 'bg-transparent border-transparent'}`}>
            <ul className={`hidden md:flex space-x-16 font-serif text-sm transition-colors duration-500 ${isDarkTheme ? 'text-white/90' : 'text-black/80'}`}>
              {['BRAND', 'RING', 'HAIR PIN'].map((item) => {
                const isActive = currentPage === item.toLowerCase();
                return (
                  <li key={item} className="relative group cursor-pointer" onClick={() => { setIsSearchOpen(false); setCurrentPage(item.toLowerCase()); }}>
                    <span className={`relative z-10 tracking-[0.2em] traditional-text transition-colors duration-500 ${isActive ? (isDarkTheme ? 'text-white' : 'text-black') : (isDarkTheme ? 'group-hover:text-white' : 'group-hover:text-black')}`}>{item}</span>
                    <div className={`absolute -bottom-2 left-0 h-[1px] transition-all duration-500 ease-[cubic-bezier(0.25,1,0.5,1)] ${isDarkTheme ? 'bg-white shadow-[0_0_8px_rgba(255,255,255,0.8)]' : 'bg-black'} ${isActive ? 'w-full opacity-100' : 'w-0 opacity-0 group-hover:opacity-100 group-hover:w-full'}`} />
                    <span className={`absolute -bottom-[9.2px] right-0 w-[3.4px] h-[3.4px] rounded-full bg-[#B02A30] transition-all duration-300 ${isActive ? 'opacity-100' : 'opacity-0 group-hover:opacity-100 group-hover:delay-[400ms]'}`} />
                  </li>
                );
              })}
            </ul>
            <div className="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2">
              <img 
                src="./eloom_logo_custom.png" 
                alt="E.Loom" 
                onClick={() => { setIsSearchOpen(false); setCurrentPage('home'); }} 
                className={`h-[54px] w-auto cursor-pointer hover:scale-110 transition-all duration-500`}
                style={{ filter: !isDarkTheme ? 'invert(1) brightness(0)' : 'none' }}
              />
            </div>
            <ul className="flex space-x-10 items-center justify-end">
              <li className="relative group cursor-pointer p-2 flex justify-center items-center" onClick={() => setIsSearchOpen(!isSearchOpen)}>
                <SearchIcon className={`transition-all duration-500 ${isDarkTheme ? 'text-white/70 group-hover:text-white drop-shadow-[0_0_2px_rgba(255,255,255,0.3)] group-hover:drop-shadow-[0_0_6px_rgba(255,255,255,0.8)]' : 'text-black/70 group-hover:text-black'}`} />
                <div className={`absolute -bottom-1 left-0 h-[1px] transition-all duration-500 ease-out opacity-0 group-hover:opacity-100 ${isDarkTheme ? 'bg-white' : 'bg-black'} ${isSearchOpen ? 'w-full opacity-100' : 'w-0 group-hover:w-full'}`} />
              </li>
              <li className="relative group cursor-pointer p-2 flex justify-center items-center" onClick={() => { setIsSearchOpen(false); setCurrentPage('account'); }}>
                <UserIcon className={`transition-all duration-500 ${isDarkTheme ? 'text-white/70 group-hover:text-white drop-shadow-[0_0_2px_rgba(255,255,255,0.3)] group-hover:drop-shadow-[0_0_6px_rgba(255,255,255,0.8)]' : 'text-black/70 group-hover:text-black'}`} />
                <div className={`absolute -bottom-1 left-0 h-[1px] transition-all duration-500 ease-out opacity-0 group-hover:opacity-100 ${isDarkTheme ? 'bg-white' : 'bg-black'} ${currentPage==='account' ? 'w-full opacity-100' : 'w-0 group-hover:w-full'}`} />
              </li>
              <li className="relative group cursor-pointer p-2 flex justify-center items-center" onClick={() => { setIsSearchOpen(false); setCurrentPage('cart'); }}>
                <CartIcon className={`transition-all duration-500 ${isDarkTheme ? 'text-white/70 group-hover:text-white drop-shadow-[0_0_2px_rgba(255,255,255,0.3)] group-hover:drop-shadow-[0_0_6px_rgba(255,255,255,0.8)]' : 'text-black/70 group-hover:text-black'}`} />
                <div className={`absolute -bottom-1 left-0 h-[1px] transition-all duration-500 ease-out opacity-0 group-hover:opacity-100 ${isDarkTheme ? 'bg-white' : 'bg-black'} ${currentPage === 'cart' ? 'w-full opacity-100' : 'w-0 group-hover:w-full'}`} />
              </li>
              <li className="relative group cursor-pointer p-2 flex justify-center items-center" onClick={() => setIsMenuOpen(true)}>
                <MenuIcon className={`transition-all duration-500 ${isDarkTheme ? 'text-white/70 group-hover:text-white drop-shadow-[0_0_2px_rgba(255,255,255,0.3)] group-hover:drop-shadow-[0_0_6px_rgba(255,255,255,0.8)]' : 'text-black/70 group-hover:text-black'}`} />
                <div className={`absolute -bottom-1 left-0 w-0 h-[1px] transition-all duration-500 ease-out opacity-0 group-hover:opacity-100 ${isDarkTheme ? 'bg-white' : 'bg-black'}`} />
              </li>
            </ul>
          </div>
          {/* Search Dropdown Overlay */}
          {isSearchOpen && (
            <div className={`w-full transition-all duration-500 absolute top-[100px] left-0 z-10 animate-slide-down border-b ${
              isDarkTheme ? 'bg-black/95 text-white border-white/10 shadow-2xl' : 'bg-[#FAFAFA]/95 text-[#151B17] border-[#3A473D]/10 shadow-[0_10px_30px_rgba(0,0,0,0.05)] backdrop-blur-md'
            }`}>
              <div className="max-w-[1200px] mx-auto px-12 lg:px-24 py-16 flex flex-col">
                <div className={`flex items-center border-b pb-6 ${isDarkTheme ? 'border-white/20' : 'border-[#151B17]/20'}`}>
                  <SearchIcon className={`w-6 h-6 mr-6 ${isDarkTheme ? 'text-white/50' : 'text-[#151B17]/50'}`} />
                  <input 
                    type="text" 
                    placeholder="키워드를 검색하세요."
                    className={`bg-transparent border-none outline-none w-full font-serif text-2xl tracking-wider traditional-text ${isDarkTheme ? 'placeholder:text-white/30 text-white' : 'placeholder:text-[#151B17]/30 text-[#151B17]'}`}
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                    onKeyDown={(e) => {
                      if(e.key === 'Enter' && searchQuery.trim()) {
                        handleSearchSubmit(searchQuery);
                      }
                    }}
                    autoFocus
                  />
                  <button 
                    onClick={() => { if(searchQuery.trim()) handleSearchSubmit(searchQuery); }}
                    className={`ml-4 font-sans text-xs tracking-[0.2em] font-bold transition-colors ${isDarkTheme ? 'text-white/50 hover:text-white' : 'text-[#151B17]/50 hover:text-[#151B17]'}`}
                  >
                    SEARCH
                  </button>
                </div>
                
                <div className="mt-8 flex gap-8 items-center">
                  <span className={`font-sans text-[10px] tracking-wide ${isDarkTheme ? 'text-white/30' : 'text-[#3A473D]/40'}`}>인기검색어</span>
                  {['결 Ring', '비녀', 'Silver', '은세공', '동백'].map(kw => (
                    <span 
                      key={kw} 
                      className={`cursor-pointer font-serif text-sm tracking-wider transition-colors ${isDarkTheme ? 'text-white/60 hover:text-white' : 'text-[#151B17]/60 hover:text-[#B02A30]'}`}
                      onClick={() => {
                         setSearchQuery(kw);
                         handleSearchSubmit(kw);
                      }}
                    >
                      {kw}
                    </span>
                  ))}
                </div>
              </div>
            </div>
          )}
        </nav>
      );
    }
    const BrandHeroSection = () => (
      <section className="relative w-full h-[calc(100vh-100px)] overflow-hidden bg-black mt-[100px]">
        {/* Background Image */}
        <img 
          src="./brand_story_bg.png" 
          alt="Brand Story Background" 
          className="absolute inset-0 w-full h-full object-cover opacity-70"
        />
        {/* Subtle Dark Gradient Overlay */}
        <div className="absolute inset-0 bg-gradient-to-t from-black via-transparent to-black/20 pointer-events-none" />
        
        <div className="relative flex flex-col items-start justify-end h-full px-12 lg:px-24 pb-20 md:pb-32 z-10 text-white">
          <div className="space-y-6 md:space-y-10">
            <p className="font-sans text-xs md:text-sm tracking-[0.4em] text-white/40 uppercase">
              Brand Story
            </p>
            
            <div className="space-y-2 md:space-y-4">
              <h2 className="traditional-text font-serif text-lg md:text-2xl text-white/80 leading-relaxed font-light">
                이어온 시간이 엮어 만들어낸 관계의 결과
              </h2>
              <h1 className="font-serif text-4xl md:text-[5.5rem] font-bold tracking-tight leading-none mb-4">
                E.LOOM
              </h1>
            </div>
            <button 
              onClick={() => {
                const philosophySection = document.getElementById('philosophy-section');
                if (philosophySection) philosophySection.scrollIntoView({ behavior: 'smooth' });
              }}
              className="flex items-center gap-3 group cursor-pointer pt-4"
            >
              <span className="font-sans text-[10px] md:text-xs tracking-[0.3em] text-white/60 group-hover:text-white transition-all duration-300 uppercase">
                Brand Philosophy
              </span>
              <div className="w-6 h-6 border border-white/20 rounded-full flex items-center justify-center group-hover:border-white/50 transition-all">
                <svg width="6" height="8" viewBox="0 0 6 8" fill="none" xmlns="http://www.w3.org/2000/svg" className="translate-x-[0.5px]">
                  <path d="M6 4L0 7.4641L0 0.535898L6 4Z" fill="currentColor" className="text-white/40 group-hover:text-white transition-colors" />
                </svg>
              </div>
            </button>
          </div>
        </div>
      </section>
    );
    const BrandPhilosophy = () => (
      <section id="philosophy-section" className="py-[120px] md:py-[220px] px-12 lg:px-24 bg-black text-white text-center">
        {/* Top Headline */}
        <div className="mb-24 md:mb-40">
          <p className="font-serif text-lg md:text-xl text-white/40 tracking-[0.2em] traditional-text">
            이어가고, 유지한 끝에 꽃이 피어나다.
          </p>
        </div>
        <div className="grid grid-cols-1 md:grid-cols-3 gap-32 md:gap-12 max-w-[1400px] mx-auto">
          {/* Connection */}
          <div className="flex flex-col items-center group">
            <div className="h-16 md:h-24 flex items-center justify-center mb-10 md:mb-14">
              <img src="./brand_icon_connection.png" alt="Connection Icon" className="h-full w-auto opacity-90 group-hover:opacity-100 transition-opacity duration-500" />
            </div>
            <h3 className="font-serif text-3xl md:text-4xl text-white/90 mb-6 md:mb-10 font-light traditional-text">
              연결 <span className="text-xl md:text-2xl text-white/30 ml-2 font-serif font-extralight">[반지]</span>
            </h3>
            <div className="space-y-1">
              <p className="traditional-text font-serif text-sm md:text-base text-white/50 tracking-normal leading-relaxed opacity-80 group-hover:opacity-100 transition-opacity">관계의 시작,</p>
              <p className="traditional-text font-serif text-sm md:text-base text-white/50 tracking-normal leading-relaxed opacity-80 group-hover:opacity-100 transition-opacity">서로를 잇는 고리</p>
            </div>
          </div>
          {/* Maintenance */}
          <div className="flex flex-col items-center group">
            <div className="h-16 md:h-24 flex items-center justify-center mb-10 md:mb-14">
              <img src="./brand_icon_maintenance.png" alt="Maintenance Icon" className="h-full w-auto opacity-90 group-hover:opacity-100 transition-opacity duration-500" />
            </div>
            <h3 className="font-serif text-3xl md:text-4xl text-white/90 mb-6 md:mb-10 font-light traditional-text">
              유지 <span className="text-xl md:text-2xl text-white/30 ml-2 font-serif font-extralight">[비녀]</span>
            </h3>
            <div className="space-y-1">
              <p className="traditional-text font-serif text-sm md:text-base text-white/50 tracking-normal leading-relaxed opacity-80 group-hover:opacity-100 transition-opacity">흐트러지지 않도록</p>
              <p className="traditional-text font-serif text-sm md:text-base text-white/50 tracking-normal leading-relaxed opacity-80 group-hover:opacity-100 transition-opacity">붙잡고 지키는 힘</p>
            </div>
          </div>
          {/* Fruition */}
          <div className="flex flex-col items-center group">
            <div className="h-16 md:h-24 flex items-center justify-center mb-10 md:mb-14">
              <img src="./brand_icon_fruition.png" alt="Fruition Icon" className="h-full w-auto opacity-90 group-hover:opacity-100 transition-opacity duration-500" />
            </div>
            <h3 className="font-serif text-3xl md:text-4xl text-white/90 mb-6 md:mb-10 font-light traditional-text">
              결과 <span className="text-xl md:text-2xl text-white/30 ml-2 font-serif font-extralight">[동백]</span>
            </h3>
            <div className="space-y-1">
              <p className="traditional-text font-serif text-sm md:text-base text-white/50 tracking-normal leading-relaxed opacity-80 group-hover:opacity-100 transition-opacity">시간이 만들어낸</p>
              <p className="traditional-text font-serif text-sm md:text-base text-white/50 tracking-normal leading-relaxed opacity-80 group-hover:opacity-100 transition-opacity">아름다운 결실</p>
            </div>
          </div>
        </div>
      </section>
    );
    const OurPhilosophy = () => (
      <section className="relative w-full h-[70vh] md:h-[90vh] min-h-[600px] flex bg-black">
        {/* Right Background Image */}
        <div className="absolute top-0 right-0 w-full md:w-[75%] h-full">
          <div 
            style={{ backgroundImage: "url('./our_philosophy_flower.png')" }} 
            className="w-full h-full bg-cover bg-right bg-no-repeat opacity-80 mix-blend-lighten filter contrast-125 saturate-50"
          />
          {/* Smooth Fade Gradient from Left (Black to Transparent) */}
          <div className="absolute inset-0 bg-gradient-to-r from-black via-black/80 to-transparent pointer-events-none w-[70%]" />
          {/* Radial gentle fade for edges */}
          <div className="absolute inset-0 bg-radial-gradient from-transparent to-black/30 pointer-events-none" />
        </div>
        
        {/* Left Content Area */}
        <div className="relative z-10 w-full h-full flex flex-col justify-center px-12 lg:px-24 xl:px-44">
          <div className="flex flex-col items-start max-w-xl">
            {/* Tagline & Divider */}
            <div className="mb-14 md:mb-20">

              src={src} 
              alt="E.Loom Background" 
              className={`absolute inset-0 w-full h-full object-cover filter brightness-[0.4] contrast-125 saturate-50 transition-opacity duration-[3000ms] ease-in-out ${index === currentImageIndex ? 'opacity-100' : 'opacity-0'}`} 
            />
          ))}
          <div className="absolute inset-0 bg-gradient-to-t from-black via-black/5 to-transparent pointer-events-none" />
          <div className="relative flex flex-col items-center justify-center h-full pointer-events-none z-10">
              <h2 className="traditional-text font-serif text-5xl md:text-7xl lg:text-8xl text-white text-center leading-tight tracking-wide drop-shadow-2xl opacity-90">
                  <span className="block italic font-light hover:tracking-widest transition-all duration-[3s]">From connection</span>
                  <span className="block mt-4 font-normal">to fruition.</span>
              </h2>
              <div className="absolute bottom-12 flex flex-col items-center gap-4 opacity-50">
                  <span className="font-sans text-[10px] text-white uppercase tracking-[0.3em]">Discover</span>
                  <div className="w-[1px] h-16 bg-white/50 relative overflow-hidden">
                      <div className="absolute top-0 left-0 w-full h-1/2 bg-white animate-[scrolldown_2s_ease-in-out_infinite]"></div>
                  </div>
              </div>
          </div>
        </section>
      );
    };
    const HomeProductCard = ({ product, onAddToCart }) => (
      <div className="group flex flex-col items-center w-full mx-auto p-8 relative border-[0.5px] border-transparent hover:border-[#3A473D]/10 transition-colors duration-700">
        <div className="w-full aspect-[4/5] bg-white flex items-center justify-center overflow-hidden mb-8 mix-blend-multiply relative">
          <img src={product.imageUrl} alt={product.name} className="w-[85%] h-[85%] object-cover transform group-hover:scale-105 transition-transform duration-1000 ease-[cubic-bezier(0.25,1,0.5,1)] grayscale group-hover:grayscale-0" />
          <div className="absolute bottom-0 left-1/2 w-0 h-[1px] bg-[#B02A30] group-hover:w-[40%] transition-all duration-500 ease-out transform -translate-x-1/2" />
          <button 
            onClick={() => onAddToCart(product)}
            className="absolute bottom-0 left-0 w-full h-12 bg-[#151B17]/90 text-white font-sans text-[10px] tracking-[0.2em] translate-y-full group-hover:translate-y-0 transition-transform duration-500 hover:bg-[#B02A30]"
          >
            ADD TO CART
          </button>
        </div>
        <div className="w-full border-t border-[#3A473D]/10 pt-4 flex justify-between items-baseline cursor-pointer">
          <div className="flex flex-col">
            <span className="font-sans text-[10px] tracking-[0.25em] text-[#3A473D]/60 uppercase">{product.type}</span>
            <h3 className="traditional-text font-serif text-lg text-[#151B17] mt-1 font-bold">{product.name}</h3>
          </div>
          <span className="font-sans text-sm tracking-wider text-[#3A473D] font-bold">{product.price}</span>
        </div>
      </div>
    );
    const MOCK_PRODUCTS = [
      ...Array.from({ length: 8 }).map((_, i) => ({
        id: `ring_${i}`,
        name: `결 (Gyeol) Ring 00${i+1}`,
        type: 'Silver 925',
        price: `₩ ${240 + i * 15},000`,
        imageUrl: "https://images.unsplash.com/photo-1605100804763-247f6ad11568?auto=format&fit=crop&w=600&q=80",
        category: 'ring'
      })),
      ...Array.from({ length: 8 }).map((_, i) => ({
        id: `hairpin_${i}`,
        name: `다시, 피어 (Binyeo) 00${i+1}`,
        type: 'Oxidized Silver & Gem',
        price: `₩ ${380 + i * 20},000`,
        imageUrl: "https://images.unsplash.com/photo-1599643478524-fb66f70362c0?auto=format&fit=crop&w=600&q=80",
        category: 'hair pin'
      }))
    ];
    const App = () => {
      const [currentPage, setCurrentPage] = React.useState('home');
      const [isMenuOpen, setIsMenuOpen] = React.useState(false);
      const [isSearchOpen, setIsSearchOpen] = React.useState(false);
      const [searchQuery, setSearchQuery] = React.useState('');
      const [submittedQuery, setSubmittedQuery] = React.useState('');
      const [isLoggedIn, setIsLoggedIn] = React.useState(false);
      const [cartItems, setCartItems] = React.useState([]);
      const [toastMessage, setToastMessage] = React.useState(null);
      const alertTimeout = React.useRef(null);
      React.useEffect(() => {
        window.scrollTo(0,0);
      }, [currentPage]);
      const addToCart = (product) => {
        setCartItems(prev => {
          const existing = prev.find(item => item.id === product.id);
          if (existing) {
            return prev.map(item => item.id === product.id ? { ...item, quantity: item.quantity + 1 } : item);
          }
          return [...prev, { ...product, quantity: 1 }];
        });
        
        if (alertTimeout.current) clearTimeout(alertTimeout.current);
        setToastMessage(`'${product.name}' 장바구니에 담겼습니다`);
        alertTimeout.current = setTimeout(() => setToastMessage(null), 3500);
      };
      const updateQuantity = (id, delta) => {
        setCartItems(prev => prev.map(item => {
          if (item.id === id) {
            const newQty = Math.max(1, item.quantity + delta);
            return { ...item, quantity: newQty };
          }
          return item;
        }));
      };
      const removeFromCart = (id) => {
        setCartItems(prev => prev.filter(item => item.id !== id));
      };
      const handleSearchSubmit = (query) => {
        setSubmittedQuery(query);
        setCurrentPage('search');
        setIsSearchOpen(false);
      };
      const getSearchResult = (query) => {
        return MOCK_PRODUCTS.filter(p => 
          p.name.toLowerCase().includes(query.toLowerCase()) || 
          p.type.toLowerCase().includes(query.toLowerCase()) ||
          p.category.toLowerCase().includes(query.toLowerCase()) ||
          (query.includes('은') && p.type.includes('Silver')) ||
          (query.includes('동백') && p.name.includes('Binyeo')) ||
          (query.includes('반지') && p.category.includes('ring'))
        );
      };
      return (
        <div className={`min-h-screen selection:bg-eloom-camellia selection:text-white pb-0 ${currentPage === 'brand' ? 'bg-black' : 'bg-[#FAFAFA]'}`}>
          <GNB 
            currentPage={currentPage} setCurrentPage={setCurrentPage} 
            isSearchOpen={isSearchOpen} setIsSearchOpen={setIsSearchOpen}
            isMenuOpen={isMenuOpen} setIsMenuOpen={setIsMenuOpen}
            searchQuery={searchQuery} setSearchQuery={setSearchQuery}
            handleSearchSubmit={handleSearchSubmit}
          />
          
          {currentPage === 'brand' ? (
            <BrandStory />
          ) : currentPage === 'ring' ? (
            <ProductCategoryPage categoryTitle="RING" products={MOCK_PRODUCTS.filter(p => p.category === 'ring')} onAddToCart={addToCart} />
          ) : currentPage === 'hair pin' ? (
            <ProductCategoryPage categoryTitle="HAIR PIN" products={MOCK_PRODUCTS.filter(p => p.category === 'hair pin')} onAddToCart={addToCart} />
          ) : currentPage === 'search' ? (
            <SearchResultsPage query={submittedQuery} filteredProducts={getSearchResult(submittedQuery)} onAddToCart={addToCart} />
          ) : currentPage === 'account' ? (
            <AccountPage isLoggedIn={isLoggedIn} setIsLoggedIn={setIsLoggedIn} />
          ) : currentPage === 'cart' ? (
            <CartPage items={cartItems} updateQuantity={updateQuantity} removeFromCart={removeFromCart} setCurrentPage={setCurrentPage} />
          ) : ['lookbook', 'notice', 'faq', 'contact', 'wishlist', 'socialmedia', 'language'].includes(currentPage) ? (
            <div className="w-full min-h-screen pt-40 px-12 lg:px-24 flex flex-col items-center justify-center bg-[#FAFAFA] animate-fade-in pb-40">
              <h1 className="font-serif text-3xl md:text-5xl traditional-text text-[#151B17] uppercase tracking-widest">{currentPage}</h1>
              <p className="mt-8 font-sans text-sm text-[#3A473D]/50 uppercase tracking-[0.2em]">Preparing this section</p>
            </div>
          ) : (
            <React.Fragment>
              <HomeHeroSection />
              <section className="relative w-full pt-[120px] pb-[200px] px-8 sm:px-16 flex flex-col items-center bg-[#FAFAFA] animate-fade-in border-b border-[#3A473D]/5 overflow-hidden">
                {/* Section Transition Gradient: Hero Black to Content Surface */}
                <div className="absolute top-0 left-0 w-full h-[60vh] bg-gradient-to-b from-black to-[#FAFAFA] pointer-events-none z-0" />
                <h2 className="relative z-10 traditional-text font-serif text-4xl text-white/90 mb-[600px] text-center border-b border-white/20 pb-4 w-full max-w-sm italic">The enduring line.</h2>
                <div className="relative z-10 grid grid-cols-1 md:grid-cols-2 gap-y-[120px] gap-x-[120px] max-w-6xl w-full">
                  <HomeProductCard product={MOCK_PRODUCTS[0]} onAddToCart={addToCart} />
                  <HomeProductCard product={MOCK_PRODUCTS[8]} onAddToCart={addToCart} />
                </div>
              </section>
            </React.Fragment>
          )}
          <SidebarMenu isOpen={isMenuOpen} onClose={() => setIsMenuOpen(false)} setCurrentPage={setCurrentPage} />
          <Toast 
            message={toastMessage} 
            onClose={() => setToastMessage(null)}
            onViewCart={() => {
              setToastMessage(null);
              setCurrentPage('cart');
            }} 
          />
          {/* Simple Footer */}
          <footer className={`w-full py-16 flex justify-center ${currentPage === 'brand' ? 'bg-black border-t border-white/5 text-white/30' : 'bg-[#FAFAFA] text-[#3A473D]/50 bg-opacity-50 border-t border-[#3A473D]/10'}`}>
            <div className="font-sans text-[10px] tracking-wider uppercase">
              © {(new Date()).getFullYear()} E.Loom.
            </div>
          </footer>
        </div>
      );
    };
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
